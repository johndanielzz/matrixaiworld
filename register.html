<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - MatrixAI World</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/main.js" defer></script>
</head>
<body data-page="register">
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="index.html">MatrixAI<small>World Platform</small></a>
      <button id="navToggle" class="nav-toggle" type="button">Menu</button>
      <nav id="siteNav" class="site-nav">
        <a href="index.html" data-nav="index">Home</a>
        <a href="terms-and-conditions.html" data-nav="terms">Terms</a>
        <a href="login.html" class="guest-only" data-nav="login">Login</a>
        <a href="register.html" class="guest-only" data-nav="register">Register</a>
      </nav>
      <div class="header-actions">
        <span id="headerAccount" class="account-chip">Guest session</span>
        <button type="button" class="btn ghost js-theme-cycle">Theme</button>
      </div>
    </div>
  </header>

  <main class="container page-shell">
    <section class="auth-card">
      <h1>Create Account</h1>
      <p class="form-hint">Includes free trial usage and dashboard access.</p>
      <form id="registerForm" class="form-grid" autocomplete="on">
        <label>
          Username
          <input id="registerUsername" class="input" type="text" required>
        </label>

        <label>
          Email
          <input id="registerEmail" class="input" type="email" required>
        </label>

        <label class="password-row">
          Password
          <input id="registerPassword" class="input" type="password" required>
          <button type="button" class="toggle-pass" data-target="registerPassword">Show</button>
        </label>
        <div class="strength-meter" data-meter-for="registerPassword"><span></span></div>

        <label class="password-row">
          Confirm Password
          <input id="registerConfirmPassword" class="input" type="password" required>
          <button type="button" class="toggle-pass" data-target="registerConfirmPassword">Show</button>
        </label>

        <label class="inline-row">
          <input id="registerTerms" type="checkbox" required>
          <span>I accept the <a href="terms-and-conditions.html" target="_blank" rel="noopener">Terms and Conditions</a></span>
        </label>

        <button type="submit" class="btn primary">Register</button>
      </form>
      <p class="form-hint">Already have an account? <a href="login.html">Sign in</a>.</p>
    </section>
  </main>

  <footer>
    <div class="container">
      <span>MatrixAI World</span>
      <span>Copyright <span class="js-year"></span></span>
    </div>
  </footer>
</body>
</html>
