<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MatrixAI World</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/main.js" defer></script>
</head>
<body data-page="login">
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="index.html">MatrixAI<small>World Platform</small></a>
      <button id="navToggle" class="nav-toggle" type="button">Menu</button>
      <nav id="siteNav" class="site-nav">
        <a href="index.html" data-nav="index">Home</a>
        <a href="terms-and-conditions.html" data-nav="terms">Terms</a>
        <a href="login.html" class="guest-only" data-nav="login">Login</a>
        <a href="register.html" class="guest-only" data-nav="register">Register</a>
      </nav>
      <div class="header-actions">
        <span id="headerAccount" class="account-chip">Guest session</span>
        <button type="button" class="btn ghost js-theme-cycle">Theme</button>
      </div>
    </div>
  </header>

  <main class="container page-shell">
    <section class="auth-card">
      <h1>Sign In</h1>
      <p class="form-hint">Demo admin: <code>admin@matrixai.world</code> / <code>Admin#2026</code></p>
      <form id="loginForm" class="form-grid" autocomplete="on">
        <label>
          Email
          <input id="loginEmail" class="input" type="email" required>
        </label>

        <label class="password-row">
          Password
          <input id="loginPassword" class="input" type="password" required>
          <button type="button" class="toggle-pass" data-target="loginPassword">Show</button>
        </label>

        <div class="strength-meter" data-meter-for="loginPassword"><span></span></div>

        <label class="inline-row">
          <input id="rememberMe" type="checkbox">
          <span>Remember email on this browser</span>
        </label>

        <div class="inline-row">
          <button type="submit" class="btn primary">Login</button>
          <button type="button" id="demoAdminBtn" class="btn ghost">Use Demo Admin</button>
        </div>
      </form>
      <p class="form-hint">No account yet? <a href="register.html">Create one</a>.</p>
    </section>
  </main>

  <footer>
    <div class="container">
      <span>MatrixAI World</span>
      <span>Copyright <span class="js-year"></span></span>
    </div>
  </footer>
</body>
</html>
